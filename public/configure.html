<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuvio Live Sports | Premium Setup</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --card-bg: rgba(28, 28, 30, 0.4);
      --card-border: rgba(255, 255, 255, 0.05);
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #ef4444;
      --accent-glow: rgba(239, 68, 68, 0.3);
      --glass: rgba(255, 255, 255, 0.02);
    }
    body {
      margin: 0; padding: 20px;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex; justify-content: center; align-items: center; min-height: 100vh;
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(239, 68, 68, 0.08), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(239, 68, 68, 0.05), transparent 25%);
    }
    .container {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 40px;
      border-radius: 24px;
      border: 1px solid var(--card-border);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      width: 100%; max-width: 500px;
      position: relative;
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    h1 {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      margin: 0 0 10px 0;
      font-size: 32px;
      background: linear-gradient(135deg, #fff 0%, #aaa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex; align-items: center; justify-content: center; gap: 12px;
    }
    .dot {
      width: 12px; height: 12px; background: var(--accent);
      border-radius: 50%; display: inline-block;
      box-shadow: 0 0 10px var(--accent-glow);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }
    p.subtitle {
      color: var(--text-muted);
      font-size: 15px;
      margin: 0;
    }
    .section {
      background: var(--glass);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }
    h3 {
      margin: 0 0 16px 0;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #fff;
    }
    .sports-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .checkbox-label {
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; font-size: 14px;
      padding: 8px 12px; border-radius: 8px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid transparent;
      transition: all 0.2s;
    }
    .checkbox-label:hover {
      background: rgba(255, 255, 255, 0.06);
    }
    .checkbox-label.active {
      border-color: rgba(239, 68, 68, 0.3);
      background: rgba(239, 68, 68, 0.1);
    }
    input[type="checkbox"] {
      appearance: none;
      width: 18px; height: 18px;
      border: 2px solid #555;
      border-radius: 4px;
      outline: none; cursor: pointer;
      position: relative;
      transition: all 0.2s;
    }
    input[type="checkbox"]:checked {
      background: var(--accent);
      border-color: var(--accent);
    }
    input[type="checkbox"]:checked::after {
      content: '✓';
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: white; font-size: 12px; font-weight: bold;
    }
    .input-group {
      margin-top: 16px;
    }
    .input-group label {
      display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 8px;
    }
    input[type="text"] {
      width: 100%; padding: 14px 16px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      color: #fff; font-size: 15px;
      box-sizing: border-box; font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    input[type="text"]:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
    }
    .btn {
      display: block; width: 100%; padding: 16px;
      background: var(--accent);
      color: #fff; text-align: center; border: none;
      border-radius: 12px; font-size: 16px; font-weight: 800;
      cursor: pointer; text-decoration: none;
      box-shadow: 0 4px 14px rgba(239, 68, 68, 0.4);
      transition: all 0.3s;
      font-family: 'Outfit', sans-serif; letter-spacing: 1px;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(239, 68, 68, 0.6);
    }
    .btn:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1><span class="dot"></span> Nuvio Sports</h1>
      <p class="subtitle">Customize your ultimate live sports dashboard.</p>
    </div>
    
    <div class="section">
      <h3>Select Sports</h3>
      <div class="sports-grid" id="sportsGrid">
        <label class="checkbox-label active"><input type="checkbox" value="football" checked> ⚽ Football</label>
        <label class="checkbox-label active"><input type="checkbox" value="basketball" checked> 🏀 Basketball</label>
        <label class="checkbox-label active"><input type="checkbox" value="cricket" checked> 🏏 Cricket</label>
        <label class="checkbox-label active"><input type="checkbox" value="american_football" checked> 🏈 NFL</label>
        <label class="checkbox-label active"><input type="checkbox" value="motorsport" checked> 🏎️ Racing</label>
        <label class="checkbox-label active"><input type="checkbox" value="rugby" checked> 🏉 Rugby</label>
        <label class="checkbox-label active"><input type="checkbox" value="other" checked> 📡 Other Sports</label>
      </div>
    </div>

    <div class="section">
      <h3>Priority Tracking</h3>
      <div class="input-group">
        <label>Favorite Teams (Comma Separated)</label>
        <input type="text" id="teams" placeholder="e.g. Arsenal, Lakers, Ferrari">
      </div>
    </div>
    
    <a href="#" id="installBtn" class="btn">INSTALL ADDON</a>
  </div>

  <script>
    const btn = document.getElementById('installBtn');
    const input = document.getElementById('teams');
    const checkboxes = document.querySelectorAll('#sportsGrid input[type="checkbox"]');

    function updateLink() {
      const teams = input.value.trim();
      const selectedSports = Array.from(checkboxes).filter(cb => cb.checked).map(cb => cb.value);
      
      let manifestUrl = window.location.origin + '/manifest.json';
      
      const config = {};
      if (teams) config.teams = teams;
      
      if (selectedSports.length < checkboxes.length) {
        config.sports = selectedSports.join(',');
        if (config.sports === '') config.sports = 'none'; // If nothing is checked
      }
      
      if (Object.keys(config).length > 0) {
        const encoded = encodeURIComponent(JSON.stringify(config));
        manifestUrl = window.location.origin + '/' + encoded + '/manifest.json';
      }
      
      const installUrl = manifestUrl.replace(/^https?:\/\//, 'stremio://');
      btn.href = installUrl;
    }

    input.addEventListener('input', updateLink);
    checkboxes.forEach(cb => {
      cb.addEventListener('change', (e) => {
        const label = e.target.closest('.checkbox-label');
        if (e.target.checked) label.classList.add('active');
        else label.classList.remove('active');
        updateLink();
      });
    });
    updateLink();
  </script>
</body>
</html>
