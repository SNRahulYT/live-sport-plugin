<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuvio Live Sports Setup</title>
  <style>
    body {
      margin: 0; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #121212; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh;
    }
    .container {
      background: #1e1e1e; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); width: 100%; max-width: 500px;
    }
    h1 { margin-top: 0; font-size: 24px; text-align: center; color: #f44; }
    p { color: #aaa; font-size: 14px; text-align: center; margin-bottom: 24px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
    input[type="text"] {
      width: 100%; padding: 12px; border: 1px solid #333; border-radius: 6px; background: #111; color: #fff; font-size: 16px; box-sizing: border-box;
    }
    input[type="text"]:focus { outline: none; border-color: #f44; }
    .btn {
      display: block; width: 100%; padding: 14px; background: #f44; color: #fff; text-align: center; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; text-decoration: none; transition: background 0.2s;
    }
    .btn:hover { background: #d33; }
    .hint { font-size: 12px; color: #777; margin-top: 6px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📡 Nuvio Live Sports</h1>
    <p>Configure your addon to get personalized match rows.</p>
    
    <div class="form-group">
      <label for="teams">Favorite Teams (Optional)</label>
      <input type="text" id="teams" placeholder="e.g. Arsenal, Lakers, Ferrari">
      <div class="hint">Comma separated. We will pin matches containing these keywords to the top of your catalog.</div>
    </div>
    
    <a href="#" id="installBtn" class="btn">Install Addon</a>
  </div>

  <script>
    const btn = document.getElementById('installBtn');
    const input = document.getElementById('teams');

    function updateLink() {
      const teams = input.value.trim();
      let manifestUrl = window.location.origin + '/manifest.json';
      
      if (teams) {
        // Stremio format: /<base64-json-config>/manifest.json
        // But Stremio SDK parses JSON directly. Let's create the JSON object.
        const config = { teams: teams };
        const encoded = encodeURIComponent(JSON.stringify(config));
        manifestUrl = window.location.origin + '/' + encoded + '/manifest.json';
      }
      
      // Convert http(s) to stremio protocol for one-click install
      const installUrl = manifestUrl.replace(/^https?:\/\//, 'stremio://');
      btn.href = installUrl;
    }

    input.addEventListener('input', updateLink);
    updateLink();
  </script>
</body>
</html>
