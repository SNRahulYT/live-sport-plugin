<!DOCTYPE html>
<html>
<head>
  <title>Stream Test</title>
</head>
<body>
  <h1>Stream Test</h1>
  <script>
    async function test() {
      try {
        console.log("Fetching Nuvio streams...");
        const res = await fetch("http://localhost:7000/stream/tv/nuvio_sport_cdn_2431347.json");
        const data = await res.json();
        console.log("Nuvio response:", data);
        
        if (data.streams && data.streams.length > 0) {
          const url = data.streams[0].url;
          console.log("Testing direct stream URL:", url);
          const res2 = await fetch(url);
          console.log("Stream fetch response:", res2.status);
        } else {
          console.log("No streams found to test.");
        }
      } catch (err) {
        console.error("Error:", err);
      }
    }
    test();
  </script>
</body>
</html>
