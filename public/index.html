<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuvio Live Sports Debugger</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --card-bg: rgba(28, 28, 30, 0.4);
      --card-border: rgba(255, 255, 255, 0.05);
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #ef4444;
      --accent-glow: rgba(239, 68, 68, 0.3);
      --glass: rgba(15, 15, 17, 0.7);
    }
    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; min-height: 100vh; }
    header { position: sticky; top: 0; z-index: 50; background: var(--glass); backdrop-filter: blur(16px); padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--card-border); }
    .brand { font-family: 'Outfit', sans-serif; font-size: 1.8rem; font-weight: 900; background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    main { padding: 40px; max-width: 1600px; margin: 0 auto; }
    
    .tabs { display: flex; gap: 15px; margin-bottom: 30px; overflow-x: auto; padding-bottom: 10px; }
    .tab { padding: 10px 20px; border-radius: 30px; background: rgba(255,255,255,0.05); border: 1px solid var(--card-border); color: var(--text-muted); cursor: pointer; font-weight: 600; transition: all 0.2s; white-space: nowrap; }
    .tab:hover { background: rgba(255,255,255,0.1); color: white; }
    .tab.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 4px 15px var(--accent-glow); }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
    .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 20px; overflow: hidden; cursor: pointer; transition: all 0.4s; position: relative; }
    .card:hover { transform: translateY(-8px) scale(1.02); border-color: rgba(255, 255, 255, 0.15); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
    .poster-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #111; overflow: hidden; }
    .background { width: 100%; height: 100%; object-fit: cover; filter: blur(20px) brightness(0.6); transform: scale(1.2); }
    .poster { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; z-index: 1; padding: 10px; }
    .logo { position: absolute; top: 15px; left: 15px; width: 48px; height: 48px; z-index: 3; border-radius: 12px; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); object-fit: contain; padding: 6px; border: 1px solid rgba(255,255,255,0.1); }
    .live-badge { position: absolute; top: 15px; right: 15px; z-index: 3; background: var(--accent); color: white; font-size: 0.75rem; font-weight: 800; padding: 4px 10px; border-radius: 20px; }
    .info { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px; z-index: 3; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); }
    .title { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.25rem; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
    .desc { font-size: 0.85rem; color: var(--text-muted); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.5; }
    
    #player-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); z-index: 100; flex-direction: column; }
    #close-btn { position: absolute; top: 30px; right: 40px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px 24px; border-radius: 30px; cursor: pointer; z-index: 101; font-weight: 600; }
    #video-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
    video { width: 100%; max-width: 1400px; max-height: 85vh; border-radius: 16px; background: #000; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
    
    #source-selector { display: none; position: absolute; z-index: 102; background: rgba(20,20,20,0.9); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); flex-direction: column; gap: 10px; }
    .source-btn { background: rgba(255,255,255,0.1); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: background 0.2s; }
    .source-btn:hover { background: var(--accent); }
    
    .loader { position: absolute; display: flex; flex-direction: column; align-items: center; gap: 15px; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

  <header>
    <div class="brand">Nuvio Web Debugger</div>
  </header>

  <main>
    <div class="tabs" id="tabs">
      <div class="tab active" onclick="loadCatalog('nuvio_sports_football', this)">⚽ Football</div>
      <div class="tab" onclick="loadCatalog('nuvio_sports_cricket', this)">🏏 Cricket</div>
      <div class="tab" onclick="loadCatalog('nuvio_sports_motorsport', this)">🏎️ Motorsport</div>
      <div class="tab" onclick="loadCatalog('nuvio_sports_basketball', this)">🏀 Basketball</div>
      <div class="tab" onclick="loadCatalog('nuvio_sports_american_football', this)">🏈 American Football</div>
      <div class="tab" onclick="loadCatalog('nuvio_sports_other', this)">📡 Other</div>
    </div>
    <div class="grid" id="grid"></div>
  </main>

  <div id="player-overlay">
    <button id="close-btn" onclick="closePlayer()">Close Player</button>
    
    <div id="source-selector">
      <h3 style="margin-top:0; color:white; font-family:'Outfit',sans-serif;">Select Stream Source</h3>
      <div id="source-buttons" style="display:flex; flex-direction:column; gap:10px;"></div>
    </div>

    <div id="video-container">
      <div class="loader" id="loader">
        <div class="spinner"></div>
        <div>Loading stream...</div>
      </div>
      <video id="video" controls autoplay></video>
    </div>
  </div>

  <script>
    let hls = null;

    async function loadCatalog(catalogId, tabElement) {
      if (tabElement) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tabElement.classList.add('active');
      }

      const grid = document.getElementById('grid');
      grid.innerHTML = '<div style="color:var(--text-muted);">Fetching matches...</div>';
      
      try {
        const res = await fetch(`/catalog/tv/${catalogId}.json`);
        const data = await res.json();
        
        grid.innerHTML = '';
        if (!data.metas || data.metas.length === 0) {
          grid.innerHTML = '<div style="color:var(--text-muted);">No live matches found in this category right now.</div>';
          return;
        }

        data.metas.forEach(meta => {
          const card = document.createElement('div');
          card.className = 'card';
          card.onclick = () => fetchAndPlay(meta.id);
          
          const isLive = meta.name.includes('🔴');
          const cleanName = meta.name.replace('🔴 [LIVE] ', '');
          
          card.innerHTML = `
            <div class="poster-container">
              <img class="background" src="${meta.background}" onerror="this.style.display='none'" loading="lazy">
              <img class="poster" src="${meta.poster}" onerror="this.src='https://raw.githubusercontent.com/stremio/stremio-addon-sdk/master/docs/api/images/stremio-logo.png'" loading="lazy">
              ${meta.logo && meta.logo !== meta.poster ? `<img class="logo" src="${meta.logo}">` : ''}
              ${isLive ? '<div class="live-badge">LIVE</div>' : ''}
            </div>
            <div class="info">
              <div class="title">${cleanName}</div>
              <div class="desc">${meta.description.replace(/\n/g, '<br>')}</div>
            </div>
          `;
          grid.appendChild(card);
        });
      } catch (err) {
        console.error(err);
        grid.innerHTML = '<div style="color:var(--accent);">Failed to load catalog. Ensure the Nuvio plugin is running.</div>';
      }
    }

    async function fetchAndPlay(id) {
      document.getElementById('player-overlay').style.display = 'flex';
      document.getElementById('loader').style.display = 'flex';
      document.getElementById('source-selector').style.display = 'none';
      const video = document.getElementById('video');
      video.style.opacity = '0';
      
      try {
        const res = await fetch(`/stream/tv/${id}.json`);
        const data = await res.json();
        
        if (!data.streams || data.streams.length === 0) {
          alert('No streams found for this match.');
          closePlayer();
          return;
        }

        if (data.streams.length === 1) {
          playStreamUrl(data.streams[0].url, data.streams[0]);
        } else {
          document.getElementById('loader').style.display = 'none';
          const selector = document.getElementById('source-selector');
          const btnContainer = document.getElementById('source-buttons');
          btnContainer.innerHTML = '';
          
          data.streams.forEach(stream => {
            const btn = document.createElement('button');
            btn.className = 'source-btn';
            btn.innerText = stream.title;
            btn.onclick = () => {
              selector.style.display = 'none';
              document.getElementById('loader').style.display = 'flex';
              playStreamUrl(stream.url, stream);
            };
            btnContainer.appendChild(btn);
          });
          
          selector.style.display = 'flex';
        }
      } catch (err) {
        console.error(err);
        alert('Error resolving stream.');
        closePlayer();
      }
    }

    function playStreamUrl(url, streamObj = null) {
      if (streamObj && streamObj.externalUrl) {
        window.open(streamObj.externalUrl, '_blank');
        closePlayer();
        return;
      }
      
      const video = document.getElementById('video');
      document.getElementById('loader').style.display = 'none';
      video.style.opacity = '1';

      if (!url) {
        alert('This stream cannot be played in the browser directly.');
        closePlayer();
        return;
      }

      if (Hls.isSupported()) {
        if (hls) hls.destroy();
        hls = new Hls({ maxBufferLength: 30 });
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(e=>console.log(e)));
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.play().catch(e=>console.log(e));
      }
    }

    function closePlayer() {
      document.getElementById('player-overlay').style.display = 'none';
      document.getElementById('source-selector').style.display = 'none';
      const video = document.getElementById('video');
      video.pause();
      video.src = '';
      if (hls) {
        hls.destroy();
        hls = null;
      }
    }

    loadCatalog('nuvio_sports_football', null);
  </script>
</body>
</html>
